<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Takvim — Vardiyalı Yapılacaklar</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="theme-color" content="#2563EB">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Takvim">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://js.puter.com/v2/"></script>
<style>
  /* ============ Tasarım sistemi (design-system/takvim/MASTER.md) ============ */
  :root {
    --primary: #2563EB;
    --on-primary: #FFFFFF;
    --accent: #059669;
    --bg: #F8FAFC;
    --surface: #FFFFFF;
    --fg: #0F172A;
    --fg-soft: #475569;
    --fg-faint: #94A3B8;
    --muted: #F1F5F9;
    --border: #E2E8F0;
    --destructive: #DC2626;
    --ring: #2563EB;
    --sabah-bg: #FEF3C7; --sabah-fg: #B45309;
    --aksam-bg: #E0E7FF; --aksam-fg: #4338CA;
    --izin-bg: #D1FAE5;  --izin-fg: #047857;
    --golge: 0 1px 3px rgba(15,23,42,.06), 0 4px 16px rgba(15,23,42,.06);
    --radius: 14px;
  }

  :root[data-theme="dark"] {
    --primary: #3B82F6;
    --on-primary: #FFFFFF;
    --accent: #34D399;
    --bg: #0B1220;
    --surface: #101a2e;
    --fg: #E2E8F0;
    --fg-soft: #94A3B8;
    --fg-faint: #64748B;
    --muted: #1a2946;
    --border: #24334f;
    --destructive: #F87171;
    --ring: #60A5FA;
    --sabah-bg: #453006; --sabah-fg: #FCD34D;
    --aksam-bg: #272a55; --aksam-fg: #A5B4FC;
    --izin-bg: #06392c;  --izin-fg: #6EE7B7;
    --golge: 0 1px 3px rgba(0,0,0,.4), 0 4px 16px rgba(0,0,0,.35);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    font-family: "Inter", "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--fg);
    font-size: 16px;
    line-height: 1.5;
    transition: background .25s, color .25s;
  }

  button { font-family: inherit; cursor: pointer; }
  button:focus-visible, input:focus-visible {
    outline: 2px solid var(--ring);
    outline-offset: 2px;
  }

  .ikon { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }

  /* ============ Üst çubuk ============ */
  header {
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 18px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .marka { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 1.02rem; }
  .marka .logo {
    width: 32px; height: 32px;
    background: var(--primary);
    color: var(--on-primary);
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
  }

  .arac { display: flex; align-items: center; gap: 8px; }

  .arac button {
    display: flex; align-items: center; gap: 7px;
    min-height: 40px;
    padding: 8px 13px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--fg);
    border-radius: 10px;
    font-size: .86rem;
    font-weight: 500;
    transition: background .2s, border-color .2s;
  }

  .arac button:hover { background: var(--muted); }

  #girisBtn { background: var(--primary); color: var(--on-primary); border-color: var(--primary); }
  #girisBtn:hover { filter: brightness(1.08); background: var(--primary); }

  .kullanici-adi { font-size: .84rem; color: var(--fg-soft); max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* ============ Ana yerleşim ============ */
  main {
    display: grid;
    grid-template-columns: minmax(360px, 1.15fr) minmax(330px, 1fr);
    gap: 16px;
    padding: 16px;
    max-width: 1180px;
    margin: 0 auto;
    height: calc(100dvh - 60px);
  }

  .kart {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--golge);
    display: flex;
    flex-direction: column;
    min-height: 0;
    transition: background .25s, border-color .25s;
  }

  /* ============ Takvim ============ */
  .takvim { padding: 18px; overflow-y: auto; }

  .takvim-baslik { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .takvim-baslik h1 { font-size: 1.1rem; font-weight: 700; }

  .nav { display: flex; gap: 6px; }
  .nav button {
    min-width: 40px; min-height: 40px;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--fg-soft);
    border-radius: 10px;
    font-size: .86rem;
    font-weight: 500;
    padding: 0 10px;
    transition: background .2s, color .2s;
  }
  .nav button:hover { background: var(--muted); color: var(--fg); }

  .lejant { display: flex; gap: 14px; margin-bottom: 10px; font-size: .76rem; color: var(--fg-soft); }
  .lejant .kutu { display: inline-block; width: 11px; height: 11px; border-radius: 3px; margin-right: 5px; }
  .kutu.sabah-r { background: #F59E0B; }
  .kutu.aksam-r { background: #6366F1; }

  .gun-adlari, .gunler { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
  .gun-adlari { margin-bottom: 6px; text-align: center; font-size: .7rem; font-weight: 600; color: var(--fg-faint); letter-spacing: .05em; text-transform: uppercase; }

  .gun {
    aspect-ratio: 1 / 1;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 5px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 2px;
    overflow: hidden;
    background: var(--surface);
    transition: border-color .15s, box-shadow .15s, background .15s;
  }

  .gun:hover { border-color: var(--primary); box-shadow: 0 2px 10px rgba(37,99,235,.18); }
  .gun.bos-gun { border: none; cursor: default; background: transparent; }
  .gun.bos-gun:hover { box-shadow: none; }

  .gun .ust { display: flex; align-items: center; justify-content: space-between; gap: 2px; }
  .gun .no { font-size: .84rem; font-weight: 600; font-variant-numeric: tabular-nums; }

  .gun.bugun { border-color: var(--primary); }
  .gun.bugun .no {
    background: var(--primary); color: var(--on-primary);
    width: 22px; height: 22px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: .74rem;
  }

  .gun.secili { border: 2px solid var(--primary); box-shadow: 0 0 0 3px color-mix(in srgb, var(--primary) 22%, transparent); }

  .gun .vardiya {
    font-size: .56rem; font-weight: 700;
    border-radius: 4px; padding: 1px 4px;
    white-space: nowrap; flex-shrink: 0;
    letter-spacing: .02em;
  }
  .vardiya.sabah { background: var(--sabah-bg); color: var(--sabah-fg); }
  .vardiya.aksam { background: var(--aksam-bg); color: var(--aksam-fg); }

  .gun.v-sabah { background: color-mix(in srgb, var(--sabah-bg) 34%, var(--surface)); }
  .gun.v-aksam { background: color-mix(in srgb, var(--aksam-bg) 34%, var(--surface)); }

  .gun .cip {
    font-size: .6rem;
    background: var(--primary);
    color: var(--on-primary);
    border-radius: 4px;
    padding: 1px 4px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .gun .cip.tamam { background: var(--muted); color: var(--fg-faint); text-decoration: line-through; }
  .gun .fazla { font-size: .6rem; color: var(--primary); font-weight: 600; }

  /* ============ Sohbet ============ */
  .sohbet-kart { overflow: hidden; }

  .sohbet-baslik {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
    font-weight: 600; font-size: .95rem;
  }
  .sohbet-baslik .durum { font-size: .74rem; font-weight: 500; color: var(--fg-faint); margin-left: auto; }

  #mesajlar {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-height: 0;
  }

  .balon {
    max-width: 88%;
    padding: 10px 13px;
    border-radius: 14px;
    font-size: .9rem;
    white-space: pre-wrap;
    word-break: break-word;
    animation: gel .22s ease;
  }

  @keyframes gel { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: none; } }
  @media (prefers-reduced-motion: reduce) {
    .balon, .gun, body, .kart { animation: none !important; transition: none !important; }
  }

  .balon.ben { align-self: flex-end; background: var(--primary); color: var(--on-primary); border-bottom-right-radius: 4px; }
  .balon.asistan { align-self: flex-start; background: var(--muted); color: var(--fg); border-bottom-left-radius: 4px; }
  .balon.dusunuyor { align-self: flex-start; background: var(--muted); color: var(--fg-faint); font-style: italic; }

  /* Gün kartı (sohbet içinde etkileşimli) */
  .gun-karti {
    align-self: stretch;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    animation: gel .22s ease;
  }
  .gun-karti .gk-baslik {
    padding: 10px 14px;
    background: var(--muted);
    display: flex; align-items: center; gap: 8px;
    font-weight: 600; font-size: .88rem;
    flex-wrap: wrap;
  }
  .gk-rozet { font-size: .72rem; font-weight: 700; border-radius: 6px; padding: 2px 9px; }
  .gk-rozet.sabah { background: var(--sabah-bg); color: var(--sabah-fg); }
  .gk-rozet.aksam { background: var(--aksam-bg); color: var(--aksam-fg); }
  .gk-rozet.izin  { background: var(--izin-bg);  color: var(--izin-fg); }

  .gun-karti ul { list-style: none; }
  .gun-karti li {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 14px;
    border-top: 1px solid var(--border);
    font-size: .88rem;
  }
  .gun-karti li input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--accent); cursor: pointer; }
  .gun-karti li .metin { flex: 1; word-break: break-word; }
  .gun-karti li.tamam .metin { text-decoration: line-through; color: var(--fg-faint); }
  .saat-rozet {
    background: var(--primary); color: var(--on-primary);
    font-size: .7rem; font-weight: 700; border-radius: 5px; padding: 2px 6px;
    font-variant-numeric: tabular-nums;
  }
  li.tamam .saat-rozet { background: var(--muted); color: var(--fg-faint); }
  .gun-karti li button.sil {
    background: none; border: none; color: var(--fg-faint);
    min-width: 34px; min-height: 34px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 8px;
    transition: color .15s, background .15s;
  }
  .gun-karti li button.sil:hover { color: var(--destructive); background: var(--muted); }
  .gun-karti .gk-bos { padding: 12px 14px; color: var(--fg-faint); font-size: .85rem; border-top: 1px solid var(--border); }

  /* Öneri çipleri */
  .oneriler { display: flex; gap: 6px; flex-wrap: wrap; padding: 0 16px 10px; }
  .oneriler button {
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--fg-soft);
    border-radius: 999px;
    padding: 6px 12px;
    font-size: .78rem;
    transition: background .2s, color .2s, border-color .2s;
  }
  .oneriler button:hover { border-color: var(--primary); color: var(--primary); }

  /* Giriş satırı */
  .yaz-alani {
    display: flex; gap: 8px;
    padding: 12px 16px 16px;
    border-top: 1px solid var(--border);
  }
  .yaz-alani input {
    flex: 1; min-width: 0;
    padding: 12px 14px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    background: var(--bg);
    color: var(--fg);
    font-size: .92rem;
    font-family: inherit;
    transition: border-color .2s;
  }
  .yaz-alani input::placeholder { color: var(--fg-faint); }
  .yaz-alani input:focus { border-color: var(--ring); outline: none; }
  .yaz-alani button {
    min-width: 46px; min-height: 46px;
    background: var(--primary);
    color: var(--on-primary);
    border: none;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    transition: filter .2s, transform .1s;
  }
  .yaz-alani button:hover { filter: brightness(1.08); }
  .yaz-alani button:active { transform: scale(.96); }

  /* ============ Mobil ============ */
  @media (max-width: 820px) {
    main {
      grid-template-columns: 1fr;
      height: auto;
      padding: 12px;
    }
    .takvim { overflow: visible; }
    .sohbet-kart { min-height: 520px; height: 72dvh; }
    header { padding: 0 12px; }
    .kullanici-adi { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="marka">
    <span class="logo">
      <svg class="ikon" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    </span>
    <span>Takvim</span>
  </div>
  <div class="arac">
    <span class="kullanici-adi" id="kullaniciAdi"></span>
    <button id="temaBtn" aria-label="Tema değiştir" title="Karanlık / aydınlık tema">
      <svg id="ikonAy" class="ikon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg id="ikonGunes" class="ikon" viewBox="0 0 24 24" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    </button>
    <button id="girisBtn">
      <svg class="ikon" viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      <span>Giriş yap</span>
    </button>
    <button id="cikisBtn" style="display:none">
      <svg class="ikon" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      <span>Çıkış</span>
    </button>
  </div>
</header>

<main>

  <section class="kart takvim" aria-label="Takvim">
    <div class="takvim-baslik">
      <h1 id="ayBaslik"></h1>
      <div class="nav">
        <button id="oncekiBtn" aria-label="Önceki ay"><svg class="ikon" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
        <button id="bugunBtn">Bugün</button>
        <button id="sonrakiBtn" aria-label="Sonraki ay"><svg class="ikon" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></button>
      </div>
    </div>
    <div class="lejant">
      <span><span class="kutu sabah-r"></span>Sabahçı</span>
      <span><span class="kutu aksam-r"></span>Akşamcı</span>
    </div>
    <div class="gun-adlari">
      <div>Pzt</div><div>Sal</div><div>Çar</div><div>Per</div><div>Cum</div><div>Cmt</div><div>Paz</div>
    </div>
    <div class="gunler" id="gunler"></div>
  </section>

  <section class="kart sohbet-kart" aria-label="Asistan">
    <div class="sohbet-baslik">
      <svg class="ikon" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      Asistan
      <span class="durum" id="aiDurum"></span>
    </div>
    <div id="mesajlar"></div>
    <div class="oneriler" id="oneriler">
      <button>yarın ne var?</button>
      <button>5 gün sonra işim var mı?</button>
      <button>1 ağustos 14:00 ahmetle buluşma</button>
    </div>
    <div class="yaz-alani">
      <input id="girdi" type="text" placeholder="Görev ekle ya da soru sor..." autocomplete="off">
      <button id="gonderBtn" aria-label="Gönder">
        <svg class="ikon" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </section>

</main>

<script>
  /* =====================================================================
     VARDİYA PLANI — vardiya değişince SADECE bu blok güncellenir.
     Kural: baslangic gününden itibaren araliklar dizisindeki gün
     aralıkları sırayla (dönerek) uygulanır; vardiya tipi de tipler
     dizisinde sırayla döner. bitis dahil o tarihe kadar hesaplanır.

     Mevcut plan (19 Temmuz 2026'da tanımlandı):
       22 Tem sabah → +2 gün akşam → +3 gün sabah → +2 gün akşam → ...
     ===================================================================== */
  const vardiyaPlani = {
    baslangic: "2026-07-22",
    araliklar: [2, 3],
    tipler: ["sabah", "aksam"],
    bitis: "2027-01-01"
  };

  const vardiyaAd = { sabah: "Sabahçı 🌅", aksam: "Akşamcı 🌙" };

  const vardiyalar = {};
  (function hesaplaVardiyalar() {
    const bitis = new Date(vardiyaPlani.bitis + "T00:00:00");
    let d = new Date(vardiyaPlani.baslangic + "T00:00:00");
    let i = 0;
    while (d <= bitis) {
      vardiyalar[tarihStr(d)] = vardiyaPlani.tipler[i % vardiyaPlani.tipler.length];
      d = new Date(d);
      d.setDate(d.getDate() + vardiyaPlani.araliklar[i % vardiyaPlani.araliklar.length]);
      i++;
    }
  })();

  /* ============ Durum ============ */
  let gorevler = JSON.parse(localStorage.getItem("takvimGorevler") || "{}");
  let kullanici = null;

  const bugun = new Date();
  let gosterilenYil = bugun.getFullYear();
  let gosterilenAy = bugun.getMonth();
  let seciliTarih = tarihStr(bugun);

  const aylar = ["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"];
  const gunAdlari = ["Pazar","Pazartesi","Salı","Çarşamba","Perşembe","Cuma","Cumartesi"];

  const gunlerEl = document.getElementById("gunler");
  const ayBaslik = document.getElementById("ayBaslik");
  const mesajlarEl = document.getElementById("mesajlar");
  const girdi = document.getElementById("girdi");
  const aiDurum = document.getElementById("aiDurum");

  /* ============ Yardımcılar ============ */
  function tarihStr(d) {
    const a = String(d.getMonth() + 1).padStart(2, "0");
    const g = String(d.getDate()).padStart(2, "0");
    return d.getFullYear() + "-" + a + "-" + g;
  }

  function uzunTarih(t) {
    const d = new Date(t + "T00:00:00");
    return d.getDate() + " " + aylar[d.getMonth()] + " " + d.getFullYear() + " " + gunAdlari[d.getDay()];
  }

  function kaydet() {
    localStorage.setItem("takvimGorevler", JSON.stringify(gorevler));
    if (kullanici && window.puter) {
      puter.kv.set("takvimGorevler", JSON.stringify(gorevler)).catch(() => {});
    }
  }

  function normallestir(metin) {
    return metin.toLocaleLowerCase("tr")
      .replace(/ğ/g, "g").replace(/ü/g, "u").replace(/ş/g, "s")
      .replace(/ı/g, "i").replace(/ö/g, "o").replace(/ç/g, "c")
      .replace(/['’]/g, " ");
  }

  function sirala(list) {
    return [...list].sort((a, b) => {
      if (a.saat && b.saat) return a.saat.localeCompare(b.saat);
      if (a.saat) return -1;
      if (b.saat) return 1;
      return 0;
    });
  }

  /* ============ Tarih / saat ayıklama ============ */
  function tarihAyikla(metin) {
    const norm = normallestir(metin);
    const aylarNorm = ["ocak","subat","mart","nisan","mayis","haziran",
                       "temmuz","agustos","eylul","ekim","kasim","aralik"];

    let hedef = null, bas = -1, uzunluk = 0;

    const re = new RegExp("(\\d{1,2})\\s*(" + aylarNorm.join("|") + ")(ta|te|da|de)?(\\s+(gunu|tarihinde))?", "");
    const m = norm.match(re);
    if (m) {
      const gun = parseInt(m[1], 10);
      const ay = aylarNorm.indexOf(m[2]);
      const simdi = new Date();
      let d = new Date(simdi.getFullYear(), ay, gun);
      const bugun0 = new Date(simdi.getFullYear(), simdi.getMonth(), simdi.getDate());
      if (d < bugun0) d = new Date(simdi.getFullYear() + 1, ay, gun);
      if (d.getDate() !== gun) return null;
      hedef = tarihStr(d);
      bas = m.index; uzunluk = m[0].length;
    } else {
      const mSonra = norm.match(/(^|\s)(\d{1,2})\s+(gun|hafta)\s+sonra(ki|si)?(\s|$)/);
      if (mSonra) {
        const n = parseInt(mSonra[2], 10) * (mSonra[3] === "hafta" ? 7 : 1);
        const d = new Date();
        d.setDate(d.getDate() + n);
        hedef = tarihStr(d);
        bas = mSonra.index + mSonra[1].length;
        uzunluk = mSonra[0].length - mSonra[1].length - (mSonra[5] ? mSonra[5].length : 0);
      } else {
        const mGun = norm.match(/(^|\s)(bugun|yarin)(de|ku|ki)?(\s|$)/);
        if (mGun) {
          const d = new Date();
          if (mGun[2] === "yarin") d.setDate(d.getDate() + 1);
          hedef = tarihStr(d);
          bas = mGun.index + mGun[1].length;
          uzunluk = mGun[2].length + (mGun[3] ? mGun[3].length : 0);
        }
      }
    }

    if (!hedef) return null;

    const kalan = (metin.slice(0, bas) + " " + metin.slice(bas + uzunluk))
      .replace(/\s+/g, " ").trim();

    return { tarih: hedef, kalan };
  }

  function saatAyikla(metin) {
    const norm = normallestir(metin);

    let m = norm.match(/(^|\s)([01]?\d|2[0-3])[:.]([0-5]\d)(\s|$)/);
    if (m) {
      const saat = m[2].padStart(2, "0") + ":" + m[3];
      const bas = m.index + m[1].length;
      const uzunluk = m[2].length + 1 + m[3].length;
      const kalan = (metin.slice(0, bas) + " " + metin.slice(bas + uzunluk))
        .replace(/\s+/g, " ").trim();
      return { saat, kalan };
    }

    m = norm.match(/(^|\s)saat\s+([01]?\d|2[0-3])(\s|$)/);
    if (m) {
      const saat = m[2].padStart(2, "0") + ":00";
      const bas = m.index + m[1].length;
      const uzunluk = ("saat " + m[2]).length;
      const kalan = (metin.slice(0, bas) + " " + metin.slice(bas + uzunluk))
        .replace(/\s+/g, " ").trim();
      return { saat, kalan };
    }

    return null;
  }

  /* ============ Takvim ============ */
  function takvimCiz() {
    ayBaslik.textContent = aylar[gosterilenAy] + " " + gosterilenYil;
    gunlerEl.innerHTML = "";

    const ilkGun = new Date(gosterilenYil, gosterilenAy, 1);
    const gunSayisi = new Date(gosterilenYil, gosterilenAy + 1, 0).getDate();
    const baslangicBoslugu = (ilkGun.getDay() + 6) % 7;

    for (let i = 0; i < baslangicBoslugu; i++) {
      const bos = document.createElement("div");
      bos.className = "gun bos-gun";
      gunlerEl.appendChild(bos);
    }

    const bugunStr = tarihStr(new Date());

    for (let g = 1; g <= gunSayisi; g++) {
      const t = tarihStr(new Date(gosterilenYil, gosterilenAy, g));
      const el = document.createElement("div");
      el.className = "gun";
      if (t === bugunStr) el.classList.add("bugun");
      if (t === seciliTarih) el.classList.add("secili");

      const vardiya = vardiyalar[t];
      if (vardiya) el.classList.add("v-" + vardiya);

      const ust = document.createElement("div");
      ust.className = "ust";
      const no = document.createElement("div");
      no.className = "no";
      no.textContent = g;
      ust.appendChild(no);

      if (vardiya) {
        const vr = document.createElement("div");
        vr.className = "vardiya " + vardiya;
        vr.textContent = vardiya === "sabah" ? "Sabah" : "Akşam";
        ust.appendChild(vr);
      }
      el.appendChild(ust);

      const gunGorevleri = sirala(gorevler[t] || []);
      for (const gv of gunGorevleri.slice(0, 2)) {
        const cip = document.createElement("div");
        cip.className = "cip" + (gv.tamam ? " tamam" : "");
        const yazi = (gv.saat ? gv.saat + " " : "") + gv.metin;
        cip.textContent = yazi;
        cip.title = yazi;
        el.appendChild(cip);
      }
      if (gunGorevleri.length > 2) {
        const fazla = document.createElement("div");
        fazla.className = "fazla";
        fazla.textContent = "+" + (gunGorevleri.length - 2) + " daha";
        el.appendChild(fazla);
      }

      el.addEventListener("click", () => {
        seciliTarih = t;
        takvimCiz();
        gunKartiGoster(t);
      });

      gunlerEl.appendChild(el);
    }
  }

  /* ============ Sohbet ============ */
  function kaydir() { mesajlarEl.scrollTop = mesajlarEl.scrollHeight; }

  function balon(metin, tip) {
    const b = document.createElement("div");
    b.className = "balon " + tip;
    b.textContent = metin;
    mesajlarEl.appendChild(b);
    kaydir();
    return b;
  }

  function gunKartiGoster(t) {
    const kart = document.createElement("div");
    kart.className = "gun-karti";

    const baslik = document.createElement("div");
    baslik.className = "gk-baslik";
    baslik.textContent = "📅 " + uzunTarih(t);

    const vardiya = vardiyalar[t];
    const rozet = document.createElement("span");
    rozet.className = "gk-rozet " + (vardiya || "izin");
    rozet.textContent = vardiya ? vardiyaAd[vardiya] : "İzin günü ✅";
    baslik.appendChild(rozet);
    kart.appendChild(baslik);

    const gunGorevleri = sirala(gorevler[t] || []);
    if (gunGorevleri.length === 0) {
      const bos = document.createElement("div");
      bos.className = "gk-bos";
      bos.textContent = "Bu güne görev eklenmemiş.";
      kart.appendChild(bos);
    } else {
      const ul = document.createElement("ul");
      for (const g of gunGorevleri) {
        const li = document.createElement("li");
        if (g.tamam) li.classList.add("tamam");

        const cb = document.createElement("input");
        cb.type = "checkbox";
        cb.checked = g.tamam;
        cb.setAttribute("aria-label", "Tamamlandı: " + g.metin);
        cb.addEventListener("change", () => {
          g.tamam = cb.checked;
          li.classList.toggle("tamam", g.tamam);
          kaydet();
          takvimCiz();
        });
        li.appendChild(cb);

        if (g.saat) {
          const sr = document.createElement("span");
          sr.className = "saat-rozet";
          sr.textContent = g.saat;
          li.appendChild(sr);
        }

        const span = document.createElement("span");
        span.className = "metin";
        span.textContent = g.metin;
        li.appendChild(span);

        const sil = document.createElement("button");
        sil.className = "sil";
        sil.setAttribute("aria-label", "Sil: " + g.metin);
        sil.innerHTML = '<svg class="ikon" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>';
        sil.addEventListener("click", () => {
          gorevler[t] = (gorevler[t] || []).filter(x => x.id !== g.id);
          if (gorevler[t].length === 0) delete gorevler[t];
          kaydet();
          takvimCiz();
          li.remove();
          balon("Silindi: " + g.metin, "asistan");
        });
        li.appendChild(sil);
        ul.appendChild(li);
      }
      kart.appendChild(ul);
    }

    mesajlarEl.appendChild(kart);
    kaydir();
  }

  /* ============ Komut işleme ============ */
  function gorevEkle(tarih, saat, metin) {
    if (!gorevler[tarih]) gorevler[tarih] = [];
    const g = { id: Date.now(), metin, tamam: false };
    if (saat) g.saat = saat;
    gorevler[tarih].push(g);
    kaydet();

    seciliTarih = tarih;
    const d = new Date(tarih + "T00:00:00");
    gosterilenYil = d.getFullYear();
    gosterilenAy = d.getMonth();
    takvimCiz();

    balon("✓ " + uzunTarih(tarih) + " gününe eklendi" + (saat ? " (" + saat + ")" : "") + ": " + metin, "asistan");
  }

  function gorevAra(soru) {
    const durak = new Set(["ne","zaman","hangi","gun","gunu","gunde","var","yok","mi","mu","isim","gorev",
                           "gorevim","gorevlerim","benim","neler","nasil","kac","tarihte","tarihinde","icin","sil"]);
    const kelimeler = normallestir(soru)
      .replace(/[?.,!]/g, " ")
      .split(/\s+/)
      .filter(k => k.length >= 3 && !durak.has(k));

    if (kelimeler.length === 0) return [];

    const bulunanlar = [];
    for (const t of Object.keys(gorevler).sort()) {
      for (const g of gorevler[t]) {
        const gNorm = normallestir(g.metin);
        if (kelimeler.some(k => gNorm.includes(k))) bulunanlar.push({ t, g });
      }
    }
    return bulunanlar;
  }

  function yerelIsle(metin) {
    const norm = normallestir(metin);

    // Silme: "... sil"
    if (/\bsil\b/.test(norm)) {
      const bulunanlar = gorevAra(metin);
      if (bulunanlar.length === 0) { balon("Silinecek görev bulamadım.", "asistan"); return true; }
      const { t, g } = bulunanlar[0];
      gorevler[t] = gorevler[t].filter(x => x.id !== g.id);
      if (gorevler[t].length === 0) delete gorevler[t];
      kaydet();
      takvimCiz();
      balon("Silindi: " + uzunTarih(t) + " — " + g.metin, "asistan");
      return true;
    }

    const soruMu = /(var mi|ne var|isim|neler|\?)/.test(norm);
    const tSonuc = tarihAyikla(metin);

    if (tSonuc) {
      if (soruMu || !tSonuc.kalan || tSonuc.kalan.length < 3 ||
          /^(bir sey|birsey|is|isim)\b/.test(normallestir(tSonuc.kalan))) {
        // Tarihli soru → gün kartı
        seciliTarih = tSonuc.tarih;
        const d = new Date(tSonuc.tarih + "T00:00:00");
        gosterilenYil = d.getFullYear(); gosterilenAy = d.getMonth();
        takvimCiz();
        gunKartiGoster(tSonuc.tarih);
        return true;
      }
      // Tarihli görev ekleme
      let kalan = tSonuc.kalan, saat = null;
      const sSonuc = saatAyikla(kalan);
      if (sSonuc && sSonuc.kalan) { saat = sSonuc.saat; kalan = sSonuc.kalan; }
      gorevEkle(tSonuc.tarih, saat, kalan);
      return true;
    }

    // Tarihsiz ama saatli → seçili güne ekle
    const sSonuc = saatAyikla(metin);
    if (sSonuc && sSonuc.kalan && !soruMu) {
      gorevEkle(seciliTarih, sSonuc.saat, sSonuc.kalan);
      return true;
    }

    // Kelime araması ("ahmetle buluşma ne zaman?")
    if (soruMu) {
      const bulunanlar = gorevAra(metin);
      if (bulunanlar.length > 0) {
        const satirlar = ["🔎 Şunları buldum:"];
        for (const { t, g } of bulunanlar.slice(0, 10)) {
          satirlar.push("• " + uzunTarih(t) + (g.saat ? " " + g.saat : "") + " — " + g.metin + (g.tamam ? " ✔" : ""));
        }
        balon(satirlar.join("\n"), "asistan");
        return true;
      }
    }

    return false; // yerel olarak anlaşılamadı → yapay zekâya sor
  }

  /* ============ Yapay zekâ (Puter — ücretsiz) ============ */
  async function aiIsle(metin) {
    if (!window.puter) return false;

    const dusunce = balon("düşünüyor...", "dusunuyor");
    try {
      const sistem =
        "Sen Türkçe konuşan bir takvim asistanısın. Bugünün tarihi: " + tarihStr(new Date()) +
        " (" + gunAdlari[new Date().getDay()] + "). Kullanıcının mesajını analiz et ve SADECE şu JSON'u döndür" +
        " (başka hiçbir şey yazma):\n" +
        '{"eylem":"ekle|sorgu|bilinmiyor","tarih":"YYYY-MM-DD veya null","saat":"HH:MM veya null","metin":"görev metni veya arama kelimesi"}\n' +
        "Kurallar: 'ekle' = kullanıcı bir görev/plan/hatırlatma eklemek istiyor. 'sorgu' = bir gün hakkında soru soruyor" +
        " (tarih ver) ya da bir görevi arıyor (metin ver, tarih null). Göreli tarihleri hesapla (yarın, haftaya salı, 3 gün sonra...)." +
        " Tarih belirsizse bugünü kullan.\n\nKullanıcı mesajı: " + metin;

      const yanit = await puter.ai.chat(sistem);
      const ham = typeof yanit === "string" ? yanit :
                  (yanit && yanit.message && typeof yanit.message.content === "string" ? yanit.message.content :
                   String(yanit));
      dusunce.remove();

      const je = ham.match(/\{[\s\S]*\}/);
      if (!je) return false;
      const k = JSON.parse(je[0]);

      if (k.eylem === "ekle" && k.metin) {
        const tarih = (k.tarih && /^\d{4}-\d{2}-\d{2}$/.test(k.tarih)) ? k.tarih : seciliTarih;
        const saat = (k.saat && /^\d{2}:\d{2}$/.test(k.saat)) ? k.saat : null;
        gorevEkle(tarih, saat, k.metin);
        return true;
      }

      if (k.eylem === "sorgu") {
        if (k.tarih && /^\d{4}-\d{2}-\d{2}$/.test(k.tarih)) {
          seciliTarih = k.tarih;
          const d = new Date(k.tarih + "T00:00:00");
          gosterilenYil = d.getFullYear(); gosterilenAy = d.getMonth();
          takvimCiz();
          gunKartiGoster(k.tarih);
          return true;
        }
        if (k.metin) {
          const bulunanlar = gorevAra(k.metin);
          if (bulunanlar.length > 0) {
            const satirlar = ["🔎 Şunları buldum:"];
            for (const { t, g } of bulunanlar.slice(0, 10)) {
              satirlar.push("• " + uzunTarih(t) + (g.saat ? " " + g.saat : "") + " — " + g.metin + (g.tamam ? " ✔" : ""));
            }
            balon(satirlar.join("\n"), "asistan");
          } else {
            balon("Buna uyan bir görev bulamadım.", "asistan");
          }
          return true;
        }
      }

      return false;
    } catch (e) {
      dusunce.remove();
      return false;
    }
  }

  async function gonder() {
    const metin = girdi.value.trim();
    if (!metin) return;
    girdi.value = "";
    balon(metin, "ben");

    if (yerelIsle(metin)) return;

    const aiBasarili = await aiIsle(metin);
    if (!aiBasarili) {
      balon("Bunu anlayamadım. 🤔 Şöyle deneyebilirsin:\n" +
            "• \"1 ağustos 14:00 ahmetle buluşma\"\n" +
            "• \"5 ağustosta işim var mı?\"\n" +
            "• \"5 gün sonra bir şey var mı?\"\n" +
            "• \"ahmetle buluşmayı sil\"", "asistan");
    }
  }

  /* ============ Hesap (Puter — ücretsiz) ============ */
  const girisBtn = document.getElementById("girisBtn");
  const cikisBtn = document.getElementById("cikisBtn");
  const kullaniciAdi = document.getElementById("kullaniciAdi");

  function hesapArayuz() {
    girisBtn.style.display = kullanici ? "none" : "flex";
    cikisBtn.style.display = kullanici ? "flex" : "none";
    kullaniciAdi.textContent = kullanici ? (kullanici.username || "") : "";
    aiDurum.textContent = kullanici ? "yapay zekâ aktif" : "çevrimdışı mod";
  }

  async function girisSonrasi() {
    try {
      kullanici = await puter.auth.getUser();
      const bulut = await puter.kv.get("takvimGorevler");
      if (bulut) {
        gorevler = JSON.parse(bulut);
        localStorage.setItem("takvimGorevler", JSON.stringify(gorevler));
      } else {
        await puter.kv.set("takvimGorevler", JSON.stringify(gorevler));
      }
      takvimCiz();
      balon("Hoş geldin " + (kullanici.username || "") + "! Görevlerin hesabına bağlandı — başka cihazdan girsen de aynı listeyi görürsün.", "asistan");
    } catch (e) { /* çevrimdışı devam */ }
    hesapArayuz();
  }

  girisBtn.addEventListener("click", async () => {
    if (!window.puter) { balon("Giriş için internet bağlantısı gerekiyor.", "asistan"); return; }
    try {
      await puter.auth.signIn();
      await girisSonrasi();
    } catch (e) { /* kullanıcı vazgeçti */ }
  });

  cikisBtn.addEventListener("click", () => {
    if (window.puter) puter.auth.signOut();
    kullanici = null;
    hesapArayuz();
    balon("Çıkış yapıldı. Görevler bu cihazda kayıtlı kalır.", "asistan");
  });

  /* ============ Tema ============ */
  const temaBtn = document.getElementById("temaBtn");
  const ikonAy = document.getElementById("ikonAy");
  const ikonGunes = document.getElementById("ikonGunes");

  function temaUygula(tema) {
    document.documentElement.setAttribute("data-theme", tema);
    localStorage.setItem("tema", tema);
    ikonAy.style.display = tema === "dark" ? "none" : "block";
    ikonGunes.style.display = tema === "dark" ? "block" : "none";
  }

  temaBtn.addEventListener("click", () => {
    const suanki = document.documentElement.getAttribute("data-theme") || "light";
    temaUygula(suanki === "dark" ? "light" : "dark");
  });

  temaUygula(localStorage.getItem("tema") ||
    (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light"));

  /* ============ Başlat ============ */
  document.getElementById("gonderBtn").addEventListener("click", gonder);
  girdi.addEventListener("keydown", e => { if (e.key === "Enter") gonder(); });

  document.getElementById("oneriler").addEventListener("click", e => {
    if (e.target.tagName === "BUTTON") { girdi.value = e.target.textContent; gonder(); }
  });

  document.getElementById("oncekiBtn").addEventListener("click", () => {
    gosterilenAy--;
    if (gosterilenAy < 0) { gosterilenAy = 11; gosterilenYil--; }
    takvimCiz();
  });

  document.getElementById("sonrakiBtn").addEventListener("click", () => {
    gosterilenAy++;
    if (gosterilenAy > 11) { gosterilenAy = 0; gosterilenYil++; }
    takvimCiz();
  });

  document.getElementById("bugunBtn").addEventListener("click", () => {
    gosterilenYil = bugun.getFullYear();
    gosterilenAy = bugun.getMonth();
    seciliTarih = tarihStr(new Date());
    takvimCiz();
    gunKartiGoster(seciliTarih);
  });

  takvimCiz();
  balon("Merhaba! 👋 Görev eklemek ya da takvimini sormak için yaz. Takvimden bir güne tıklayınca o günü burada gösteririm.", "asistan");

  if (window.puter && puter.auth && puter.auth.isSignedIn()) {
    girisSonrasi();
  } else {
    hesapArayuz();
  }

  if ("serviceWorker" in navigator && location.protocol === "https:") {
    navigator.serviceWorker.register("sw.js");
  }
</script>
</body>
</html>
